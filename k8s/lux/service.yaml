# Hanzo Ingress ClusterIP Service
# No DO LoadBalancer needed: DaemonSet uses hostNetwork + hostPort 80/443
---
apiVersion: v1
kind: Service
metadata:
  name: hanzo-ingress
  namespace: lux-system
  labels:
    app: hanzo-ingress
    app.kubernetes.io/name: hanzo-ingress
    app.kubernetes.io/part-of: lux-network
spec:
  type: ClusterIP
  selector:
    app: hanzo-ingress
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
    - name: https
      port: 443
      targetPort: 443
      protocol: TCP
