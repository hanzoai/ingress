name: Build and Deploy Ingress

on:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'internal/**'
      - 'webui/**'
      - 'Dockerfile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/ingress
      deploy: false
    secrets: inherit

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: docker
    runs-on: hanzo-k8s
    environment: production
    steps:
      - name: Rolling restart ingress DaemonSet
        run: |
          kubectl rollout restart daemonset/hanzo-ingress -n hanzo
          kubectl rollout status daemonset/hanzo-ingress -n hanzo --timeout=120s
