---
kind: Namespace
apiVersion: v1
metadata:
  name: ingress

---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: ingress
  namespace: ingress

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ingress
  namespace: ingress
  labels:
    app: ingress
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
    spec:
      serviceAccountName: ingress
      containers:
        - name: ingress
          image: ghcr.io/hanzoai/ingress:latest
          imagePullPolicy: Never
          args:
            - --api.insecure
            - --log.level=debug
            - --entrypoints.pweb.address=:80
            - --entrypoints.pwebsecure.address=:443
            - --entrypoints.privweb.address=:8080
            - --entrypoints.privwebsecure.address=:4443
            - --entrypoints.ingress.address=:9000
            - --experimental.knative
            - --providers.knative.publicEntrypoints=pweb,pwebsecure
            - --providers.knative.publicService.namespace=ingress
            - --providers.knative.publicService.name=ingress
            - --providers.knative.privateEntrypoints=privweb,privwebsecure
            - --providers.knative.privateService.namespace=ingress
            - --providers.knative.privateService.name=privingress
            - --providers.knative.throttleduration=2s

          ports:
            - name: pweb
              containerPort: 80
            - name: pwebsecure
              containerPort: 443
            - name: privweb
              containerPort: 8080
            - name: privwebsecure
              containerPort: 4443
            - name: ingress
              containerPort: 9000

---
apiVersion: v1
kind: Service
metadata:
  name: ingress
  namespace: ingress
spec:
  type: LoadBalancer
  selector:
    app: ingress
  ports:
    - port: 80
      name: web
      targetPort: pweb
    - port: 443
      name: websecure
      targetPort: pwebsecure
    - port: 9000
      name: ingress
      targetPort: ingress

---
apiVersion: v1
kind: Service
metadata:
  name: privingress
  namespace: ingress
spec:
  selector:
    app: ingress
  ports:
    - port: 80
      name: web
      targetPort: privweb
    - port: 443
      name: websecure
      targetPort: privwebsecure
