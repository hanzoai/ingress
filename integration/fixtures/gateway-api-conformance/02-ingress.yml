---
kind: GatewayClass
apiVersion: gateway.networking.k8s.io/v1
metadata:
  name: ingress
spec:
  controllerName: hanzo.ai/gateway-controller

---
kind: Namespace
apiVersion: v1
metadata:
  name: ingress

---
kind: ServiceAccount
apiVersion: v1
metadata:
  name: ingress
  namespace: ingress

---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: ingress
  namespace: ingress
  labels:
    app: ingress

spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingress
  template:
    metadata:
      labels:
        app: ingress
    spec:
      serviceAccountName: ingress
      containers:
        - name: ingress
          image: ghcr.io/hanzoai/ingress:latest
          imagePullPolicy: Never
          args:
            - --log.level=DEBUG
            - --api.insecure
            - --entrypoints.web.address=:80
            - --entrypoints.websecure.address=:443
            - --entrypoints.web8080.address=:8080
            - --entrypoints.ingress.address=:9000
            - --providers.kubernetesgateway.experimentalChannel
            - --providers.kubernetesgateway.statusaddress.service.namespace=ingress
            - --providers.kubernetesgateway.statusaddress.service.name=ingress
          ports:
            - name: web
              containerPort: 80
            - name: websecure
              containerPort: 443
            - name: web8080
              containerPort: 8080
            - name: ingress
              containerPort: 9000

---
apiVersion: v1
kind: Service
metadata:
  name: ingress
  namespace: ingress
spec:
  type: LoadBalancer
  selector:
    app: ingress
  ports:
    - port: 80
      name: web
      targetPort: web
    - port: 443
      name: websecure
      targetPort: websecure
    - port: 8080
      name: web8080
      targetPort: web8080
    - port: 9000
      name: ingress
      targetPort: ingress
