apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: ingress-lb
spec:
  controller: hanzo.ai/ingress-controller
---
apiVersion: hanzo.ai/v1alpha1
kind: IngressRoute
metadata:
  name: test.route
  namespace: default

spec:
  entryPoints:
    - foo

  ingressClassName: ingress-lb

  routes:
    - match: Host(`foo.com`) && PathPrefix(`/bar`)
      kind: Rule
      priority: 12
      services:
        - name: whoami
          port: 80
