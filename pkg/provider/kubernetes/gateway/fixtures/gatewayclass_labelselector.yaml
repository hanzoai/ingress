---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: ingress-internal
  labels:
    name: ingress-internal
spec:
  controllerName: hanzo.ai/gateway-controller

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ingress-internal
  namespace: default
spec:
  gatewayClassName: ingress-internal
  listeners:
    - name: http
      protocol: HTTP
      port: 9080
      allowedRoutes:
        namespaces:
          from: Same

---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: ingress-external
  labels:
    name: ingress-external
spec:
  controllerName: hanzo.ai/gateway-controller

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ingress-external
  namespace: default
spec:
  gatewayClassName: ingress-external
  listeners:
    - name: http
      protocol: HTTP
      port: 9080
      allowedRoutes:
        namespaces:
          from: Same
